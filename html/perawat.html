<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Perawat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h3>SIRS EMR</h3>
            <a class="active">Dashboard</a>
            <a>Pasien</a>
            <a>Laporan</a>

            <div class="logout">Logout</div>
        </div>

        <!-- MAIN -->
        <div class="main">

            <!-- TOPBAR -->
            <div class="topbar">
                <div>
                    <h2>Dashboard Perawat</h2>
                    <p>Selamat datang, Siti</p>
                </div>
                <div class="user">Perawat</div>
            </div>

            <!-- STAT -->
            <div class="cards">

                <div class="card stat">
                    <p>Total Pasien</p>
                    <h2>45</h2>
                </div>

                <div class="card stat">
                    <p>Pasien Baru</p>
                    <h2>8</h2>
                </div>

                <div class="card stat">
                    <p>Data Update</p>
                    <h2>12</h2>
                </div>

                <div class="card stat">
                    <p>Tindakan</p>
                    <h2>15</h2>
                </div>

            </div>

            <!-- CONTENT -->
            <div class="content">

                <!-- FORM INPUT -->
                <div class="card form-card">
                    <h4>Input Data Pasien</h4>

                    <label>Nama</label>
                    <input type="text">

                    <label>Tanggal Lahir</label>
                    <input type="date">

                    <label>Jenis Kelamin</label>
                    <select>
                        <option>Pilih</option>
                        <option>Laki-laki</option>
                        <option>Perempuan</option>
                    </select>

                    <label>No Telp</label>
                    <input type="text">

                    <label>Alamat</label>
                    <textarea></textarea>

                    <div class="btn-group">
                        <button class="btn-outline">Reset</button>
                        <button class="btn-primary">Simpan</button>
                    </div>
                </div>

                <!-- TABLE -->
                <div class="card table-card">
                    <h4>Daftar Pasien</h4>

                    <table>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Status</th>
                        </tr>

                        <tr>
                            <td>1</td>
                            <td>Rina</td>
                            <td><span class="badge success">Aktif</span></td>
                        </tr>

                        <tr>
                            <td>2</td>
                            <td>Dedi</td>
                            <td><span class="badge danger">Nonaktif</span></td>
                        </tr>

                    </table>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
