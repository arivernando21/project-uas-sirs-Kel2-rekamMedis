<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login EMR</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="logo">
            <div class="icon">❤</div>
            <h1>SIRS EMR</h1>
            <p>Sistem Informasi Rekam Medis</p>
        </div>

        <p class="desc">
            Kelola data pasien, rekam medis,<br>
            dan informasi kesehatan dengan<br>
            mudah dan terintegrasi.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="login-card">

            <h2>Login</h2>
            <p class="sub">Silakan login untuk melanjutkan</p>

            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">

            <select>
                <option>Pilih Role</option>
                <option>Admin</option>
                <option>Dokter</option>
                <option>Perawat</option>
            </select>

            <button class="btn-primary">Login</button>

            <div class="divider">atau</div>

            <button class="btn-outline">Login sebagai Guest</button>

            <p class="footer">© 2024 SIRS EMR</p>

        </div>
    </div>

</div>

</body>
</html>
